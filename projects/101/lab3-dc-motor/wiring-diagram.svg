<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <style>
    .label { font-family: monospace; font-size: 10px; fill: #333; }
    .title { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #222; }
    .pin-label { font-family: monospace; font-size: 8px; fill: #555; }
    .wire-label { font-family: monospace; font-size: 8px; fill: #666; }
  </style>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" class="title">Lab 3: Arduino + L298N + 2x DC Motor — Wiring Diagram</text>

  <!-- ============ ARDUINO UNO ============ -->
  <rect x="30" y="250" width="200" height="240" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="130" y="280" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">ARDUINO UNO</text>

  <!-- Arduino pins (right side - digital) -->
  <circle cx="230" cy="300" r="4" fill="#fff"/>
  <text x="215" y="303" text-anchor="end" class="pin-label" fill="#fff">D5</text>

  <circle cx="230" cy="320" r="4" fill="#fff"/>
  <text x="215" y="323" text-anchor="end" class="pin-label" fill="#fff">D6</text>

  <circle cx="230" cy="340" r="4" fill="#fff"/>
  <text x="215" y="343" text-anchor="end" class="pin-label" fill="#fff">D7</text>

  <circle cx="230" cy="360" r="4" fill="#fff"/>
  <text x="215" y="363" text-anchor="end" class="pin-label" fill="#fff">D8</text>

  <circle cx="230" cy="380" r="4" fill="#fff"/>
  <text x="215" y="383" text-anchor="end" class="pin-label" fill="#fff">D9</text>

  <circle cx="230" cy="400" r="4" fill="#fff"/>
  <text x="215" y="403" text-anchor="end" class="pin-label" fill="#fff">D10</text>

  <!-- Arduino pins (bottom - power) -->
  <circle cx="100" cy="490" r="4" fill="#fff"/>
  <text x="100" y="505" text-anchor="middle" class="pin-label" fill="#fff">5V</text>

  <circle cx="140" cy="490" r="4" fill="#fff"/>
  <text x="140" y="505" text-anchor="middle" class="pin-label" fill="#fff">GND</text>

  <!-- ============ L298N MODULE ============ -->
  <rect x="350" y="200" width="180" height="260" rx="6" fill="#c62828" stroke="#8e0000" stroke-width="2"/>
  <text x="440" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">L298N</text>
  <text x="440" y="248" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffcdd2">H-Bridge Driver</text>

  <!-- Heatsink visual -->
  <rect x="390" y="255" width="80" height="40" rx="3" fill="#424242" stroke="#212121" stroke-width="1"/>
  <text x="430" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#bbb">HEATSINK</text>

  <!-- L298N input pins (left side) -->
  <circle cx="350" cy="320" r="4" fill="#fdd835"/>
  <text x="362" y="323" class="pin-label" fill="#fff">ENA</text>

  <circle cx="350" cy="345" r="4" fill="#fdd835"/>
  <text x="362" y="348" class="pin-label" fill="#fff">IN1</text>

  <circle cx="350" cy="370" r="4" fill="#fdd835"/>
  <text x="362" y="373" class="pin-label" fill="#fff">IN2</text>

  <circle cx="350" cy="395" r="4" fill="#fdd835"/>
  <text x="362" y="398" class="pin-label" fill="#fff">IN3</text>

  <circle cx="350" cy="420" r="4" fill="#fdd835"/>
  <text x="362" y="423" class="pin-label" fill="#fff">IN4</text>

  <circle cx="350" cy="445" r="4" fill="#fdd835"/>
  <text x="362" y="448" class="pin-label" fill="#fff">ENB</text>

  <!-- L298N output pins (right side) -->
  <circle cx="530" cy="320" r="4" fill="#81d4fa"/>
  <text x="510" y="323" text-anchor="end" class="pin-label" fill="#fff">OUT1</text>

  <circle cx="530" cy="345" r="4" fill="#81d4fa"/>
  <text x="510" y="348" text-anchor="end" class="pin-label" fill="#fff">OUT2</text>

  <circle cx="530" cy="395" r="4" fill="#81d4fa"/>
  <text x="510" y="398" text-anchor="end" class="pin-label" fill="#fff">OUT3</text>

  <circle cx="530" cy="420" r="4" fill="#81d4fa"/>
  <text x="510" y="423" text-anchor="end" class="pin-label" fill="#fff">OUT4</text>

  <!-- L298N power pins (bottom) -->
  <circle cx="400" cy="460" r="4" fill="#fff"/>
  <text x="400" y="475" text-anchor="middle" class="pin-label" fill="#fff">12V</text>

  <circle cx="440" cy="460" r="4" fill="#fff"/>
  <text x="440" y="475" text-anchor="middle" class="pin-label" fill="#fff">GND</text>

  <circle cx="480" cy="460" r="4" fill="#fff"/>
  <text x="480" y="475" text-anchor="middle" class="pin-label" fill="#fff">5V</text>

  <!-- ============ MOTOR A ============ -->
  <ellipse cx="660" cy="280" rx="40" ry="40" fill="#ffb300" stroke="#f57f17" stroke-width="2"/>
  <rect x="698" y="272" width="20" height="16" rx="2" fill="#9e9e9e" stroke="#616161" stroke-width="1"/>
  <text x="660" y="276" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#333">DC</text>
  <text x="660" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Motor A</text>

  <!-- Motor A terminals -->
  <circle cx="620" cy="268" r="4" fill="#d32f2f"/>
  <text x="610" y="260" text-anchor="end" class="pin-label">T1</text>
  <circle cx="620" cy="292" r="4" fill="#333"/>
  <text x="610" y="300" text-anchor="end" class="pin-label">T2</text>

  <!-- ============ MOTOR B ============ -->
  <ellipse cx="660" cy="420" rx="40" ry="40" fill="#ffb300" stroke="#f57f17" stroke-width="2"/>
  <rect x="698" y="412" width="20" height="16" rx="2" fill="#9e9e9e" stroke="#616161" stroke-width="1"/>
  <text x="660" y="416" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#333">DC</text>
  <text x="660" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Motor B</text>

  <!-- Motor B terminals -->
  <circle cx="620" cy="408" r="4" fill="#d32f2f"/>
  <text x="610" y="400" text-anchor="end" class="pin-label">T1</text>
  <circle cx="620" cy="432" r="4" fill="#333"/>
  <text x="610" y="440" text-anchor="end" class="pin-label">T2</text>

  <!-- ============ BATTERY ============ -->
  <rect x="370" y="490" width="80" height="25" rx="4" fill="#333" stroke="#111" stroke-width="1"/>
  <text x="410" y="507" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">12V BATT</text>
  <circle cx="380" cy="490" r="3" fill="#d32f2f"/>
  <circle cx="440" cy="490" r="3" fill="#333"/>

  <!-- ============ WIRES ============ -->
  <!-- Arduino D9 → ENA (purple — PWM speed A) -->
  <line x1="234" y1="380" x2="346" y2="320" stroke="#9c27b0" stroke-width="2.5"/>
  <text x="280" y="342" class="wire-label" fill="#9c27b0">PWM speed</text>

  <!-- Arduino D8 → IN1 (blue — direction A) -->
  <line x1="234" y1="360" x2="346" y2="345" stroke="#1976d2" stroke-width="2"/>

  <!-- Arduino D7 → IN2 (cyan — direction A) -->
  <line x1="234" y1="340" x2="346" y2="370" stroke="#00acc1" stroke-width="2"/>
  <text x="275" y="365" class="wire-label" fill="#1976d2">dir A</text>

  <!-- Arduino D6 → IN3 (green — direction B) -->
  <line x1="234" y1="320" x2="346" y2="395" stroke="#2e7d32" stroke-width="2"/>

  <!-- Arduino D5 → IN4 (dark green — direction B) -->
  <line x1="234" y1="300" x2="346" y2="420" stroke="#1b5e20" stroke-width="2"/>
  <text x="275" y="415" class="wire-label" fill="#2e7d32">dir B</text>

  <!-- Arduino D10 → ENB (orange — PWM speed B) -->
  <line x1="234" y1="400" x2="346" y2="445" stroke="#e65100" stroke-width="2.5"/>
  <text x="280" y="432" class="wire-label" fill="#e65100">PWM speed</text>

  <!-- L298N OUT1 → Motor A T1 (red) -->
  <line x1="534" y1="320" x2="616" y2="268" stroke="#d32f2f" stroke-width="2.5"/>

  <!-- L298N OUT2 → Motor A T2 (brown) -->
  <line x1="534" y1="345" x2="616" y2="292" stroke="#5d4037" stroke-width="2.5"/>

  <!-- L298N OUT3 → Motor B T1 (red) -->
  <line x1="534" y1="395" x2="616" y2="408" stroke="#d32f2f" stroke-width="2.5"/>

  <!-- L298N OUT4 → Motor B T2 (brown) -->
  <line x1="534" y1="420" x2="616" y2="432" stroke="#5d4037" stroke-width="2.5"/>

  <!-- Arduino 5V → L298N 5V (red) -->
  <path d="M 100 490 L 100 510 L 480 510 L 480 464" stroke="#d32f2f" stroke-width="2" fill="none"/>

  <!-- Arduino GND → L298N GND (black) -->
  <path d="M 140 490 L 140 515 L 440 515 L 440 464" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Battery + → L298N 12V -->
  <line x1="380" y1="490" x2="400" y2="464" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Battery − → L298N GND -->
  <line x1="440" y1="490" x2="440" y2="464" stroke="#333" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- ============ LEGEND ============ -->
  <rect x="580" y="60" width="200" height="130" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="680" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">WIRE KEY</text>

  <line x1="595" y1="95" x2="625" y2="95" stroke="#9c27b0" stroke-width="2.5"/>
  <text x="635" y="98" class="pin-label" fill="#333">Purple = PWM (speed)</text>

  <line x1="595" y1="112" x2="625" y2="112" stroke="#1976d2" stroke-width="2"/>
  <text x="635" y="115" class="pin-label" fill="#333">Blue/Cyan = Direction A</text>

  <line x1="595" y1="129" x2="625" y2="129" stroke="#2e7d32" stroke-width="2"/>
  <text x="635" y="132" class="pin-label" fill="#333">Green = Direction B</text>

  <line x1="595" y1="146" x2="625" y2="146" stroke="#e65100" stroke-width="2.5"/>
  <text x="635" y="149" class="pin-label" fill="#333">Orange = PWM (speed B)</text>

  <line x1="595" y1="163" x2="625" y2="163" stroke="#d32f2f" stroke-width="2.5"/>
  <text x="635" y="166" class="pin-label" fill="#333">Red/Brown = Motor outputs</text>

  <line x1="595" y1="180" x2="625" y2="180" stroke="#333" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="635" y="183" class="pin-label" fill="#333">Dashed = External 12V supply</text>
</svg>
