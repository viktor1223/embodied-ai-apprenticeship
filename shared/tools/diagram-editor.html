}

// ═══════════════════════════════════════════════════════
// SIMULATION ENGINE
// ═══════════════════════════════════════════════════════

const sim = {
  running: false,
  abort: false,
  pins: {},       // pin -> { mode, value }
  servos: {},     // pin -> angle
  connectionGraph: {},
};

function buildSimConnectionGraph() {
  sim.connectionGraph = {};
  state.connections.forEach(conn => {
    if (!conn || conn.length < 2) return;
    const [a, b] = conn;
    if (!sim.connectionGraph[a]) sim.connectionGraph[a] = [];
    if (!sim.connectionGraph[b]) sim.connectionGraph[b] = [];
    sim.connectionGraph[a].push(b);
    sim.connectionGraph[b].push(a);
  });
}

function getSimConnectedPins(pinRef) {
  return sim.connectionGraph[pinRef] || [];
}

// Find what Arduino pin a component pin connects to (traces through resistors)
function findConnectedArduinoPin(partId, pinName) {
  const ref = `${partId}:${pinName}`;
  const connected = getSimConnectedPins(ref);
  for (const c of connected) {
    const [cPartId, cPin] = c.split(':');
    const cPart = state.parts.find(p => p.id === cPartId);
    if (cPart && cPart.type === 'wokwi-arduino-uno') return cPin;
    // Trace through resistors
    if (cPart && cPart.type === 'wokwi-resistor') {
      const otherPin = c.endsWith(':1') ? `${cPartId}:2` : `${cPartId}:1`;
      const next = getSimConnectedPins(otherPin);
      for (const n of next) {
        const [nPartId] = n.split(':');
        const nPart = state.parts.find(p => p.id === nPartId);
        if (nPart && nPart.type === 'wokwi-arduino-uno') return n.split(':')[1];
      }
    }
  }
  return null;
}

// Find motor connected to a bridge output channel
function findMotorOnBridgeChannel(bridgeId, out1, out2) {
  const out1Ref = `${bridgeId}:${out1}`;
  const connected = getSimConnectedPins(out1Ref);
  for (const c of connected) {
    const [partId] = c.split(':');
    const part = state.parts.find(p => p.id === partId);
    if (part && part.type === 'chip-dc-motor') return part;
  }
  const out2Ref = `${bridgeId}:${out2}`;
  const connected2 = getSimConnectedPins(out2Ref);
  for (const c of connected2) {
    const [partId] = c.split(':');
    const part = state.parts.find(p => p.id === partId);
    if (part && part.type === 'chip-dc-motor') return part;
  }
  return null;
}

function simReset() {
  sim.running = false;
  sim.abort = true;
  sim.pins = {};
  sim.servos = {};
  // Clear visual state on parts
  state.parts.forEach(p => { delete p._simBrightness; delete p._simAngle; delete p._simSpeed; delete p._simDirection; });
  document.getElementById('simStatus').textContent = 'Stopped';
  document.getElementById('btnSimRun').disabled = false;
  document.getElementById('btnSimStop').disabled = true;
  renderComponents();
}

function simStop() {
  sim.abort = true;
  sim.running = false;
  document.getElementById('simStatus').textContent = 'Stopped';
  document.getElementById('btnSimRun').disabled = false;
  document.getElementById('btnSimStop').disabled = true;
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function serialPrint(text) {
  const el = document.getElementById('serialOutput');
  el.textContent += text;
  el.scrollTop = el.scrollHeight;
}

// ─── Source Parser ───

function parseSource(src) {
  let code = src.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '');
  // Strip #include lines
  code = code.replace(/^\s*#include\s*[<"].*[>"]\s*$/gm, '');

  // Extract #define and const int
  const defines = {};
  code.replace(/#define\s+(\w+)\s+(\S+)/g, (_, name, val) => { defines[name] = val; });
  code.replace(/const\s+int\s+(\w+)\s*=\s*([^;]+);/g, (_, name, val) => { defines[name] = val.trim(); });

  // Extract int/byte variables (globals)
  code.replace(/(?:int|byte|long|unsigned long|float)\s+(\w+)\s*=\s*([^;]+);/g, (_, name, val) => { defines[name] = val.trim(); });

  // Extract Servo declarations → register servo objects
  code.replace(/Servo\s+(\w+)\s*;/g, (_, name) => { defines[`__is_servo_${name}`] = true; });

  // Extract setup() body
  const setupMatch = code.match(/void\s+setup\s*\(\s*\)\s*\{([\s\S]*?)^\}/m);
  const setupBody = setupMatch ? setupMatch[1] : '';

  // Extract loop() body
  const loopMatch = code.match(/void\s+loop\s*\(\s*\)\s*\{([\s\S]*?)^\}/m);
  const loopBody = loopMatch ? loopMatch[1] : '';

  // Extract helper functions
  const helpers = {};
  const funcRegex = /(?:void|int|float|byte)\s+(\w+)\s*\(([^)]*)\)\s*\{([\s\S]*?)^\}/gm;
  let match;
  while ((match = funcRegex.exec(code)) !== null) {
    const name = match[1];
    if (name !== 'setup' && name !== 'loop') {
      const params = match[2].split(',').map(p => p.trim().split(/\s+/).pop()).filter(Boolean);
      helpers[name] = { params, body: match[3] };
    }
  }

  return { defines, setupBody, loopBody, helpers };
}

function resolveValue(val, defines) {
  if (val === undefined || val === null) return 0;
  val = String(val).trim();
  if (defines[val] !== undefined) return resolveValue(defines[val], defines);
  if (val === 'HIGH' || val === 'true') return 1;
  if (val === 'LOW' || val === 'false') return 0;
  if (val === 'OUTPUT') return 1;
  if (val === 'INPUT') return 0;
  if (val === 'INPUT_PULLUP') return 2;
  const num = parseFloat(val);
  return isNaN(num) ? val : num;
}

// ─── Expression Evaluator ───

function evaluateExpression(expr, defines, localVars) {
  expr = expr.trim();
  const ctx = {...defines, ...localVars};

  // analogRead(pin)
  let m = expr.match(/analogRead\s*\(\s*(.+?)\s*\)/);
  if (m) {
    const pin = resolveValue(m[1], ctx);
    return getSimAnalogInput(pin);
  }

  // digitalRead(pin)
  m = expr.match(/digitalRead\s*\(\s*(.+?)\s*\)/);
  if (m) {
    const pin = resolveValue(m[1], ctx);
    return (sim.pins[pin] && sim.pins[pin].value) || 0;
  }

  // map(x, inMin, inMax, outMin, outMax)
  m = expr.match(/map\s*\(\s*(.+?)\s*,\s*(.+?)\s*,\s*(.+?)\s*,\s*(.+?)\s*,\s*(.+?)\s*\)/);
  if (m) {
    const args = [m[1], m[2], m[3], m[4], m[5]].map(a => {
      const v = evaluateExpression(a, defines, localVars);
      return typeof v === 'number' ? v : resolveValue(a, ctx);
    });
    return Math.round((args[0] - args[1]) * (args[4] - args[3]) / (args[2] - args[1]) + args[3]);
  }

  // constrain(x, lo, hi)
  m = expr.match(/constrain\s*\(\s*(.+?)\s*,\s*(.+?)\s*,\s*(.+?)\s*\)/);
  if (m) {
    const x = evaluateExpression(m[1], defines, localVars);
    const lo = resolveValue(m[2], ctx);
    const hi = resolveValue(m[3], ctx);
    return Math.min(Math.max(x, lo), hi);
  }

  // millis()
  if (expr.match(/millis\s*\(\s*\)/)) return Math.floor(performance.now());

  // Simple arithmetic: val * val, val / val, val + val, val - val
  m = expr.match(/^(.+?)\s*([+\-*/])\s*(.+?)$/);
  if (m) {
    const left = resolveValue(m[1], ctx);
    const right = resolveValue(m[3], ctx);
    if (typeof left === 'number' && typeof right === 'number') {
      switch (m[2]) {
        case '+': return left + right;
        case '-': return left - right;
        case '*': return left * right;
        case '/': return right !== 0 ? Math.floor(left / right) : 0;
      }
    }
  }

  return resolveValue(expr, ctx);
}

function evaluateCondition(condStr, defines, localVars) {
  const ctx = {...defines, ...localVars};
  let m;
  // i < N
  m = condStr.match(/(\w+)\s*<\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) < resolveValue(m[2], ctx);
  // i > N
  m = condStr.match(/(\w+)\s*>\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) > resolveValue(m[2], ctx);
  // i <= N
  m = condStr.match(/(\w+)\s*<=\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) <= resolveValue(m[2], ctx);
  // i >= N
  m = condStr.match(/(\w+)\s*>=\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) >= resolveValue(m[2], ctx);
  // i == N
  m = condStr.match(/(\w+)\s*==\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) === resolveValue(m[2], ctx);
  // i != N
  m = condStr.match(/(\w+)\s*!=\s*(.+)/);
  if (m) return resolveValue(m[1], ctx) !== resolveValue(m[2], ctx);
  return false;
}

// ─── Statement Tokenizer (handles for loops and blocks) ───

function tokenizeStatements(body) {
  const statements = [];
  let i = 0, len = body.length;

  while (i < len) {
    // Skip whitespace
    while (i < len && /\s/.test(body[i])) i++;
    if (i >= len) break;

    // Check for 'for' loop
    if (body.substring(i, i + 3) === 'for' && /\s*\(/.test(body.substring(i + 3, i + 10))) {
      // Extract for(init; cond; incr) { body }
      const parenStart = body.indexOf('(', i + 3);
      let depth = 1, j = parenStart + 1;
      while (j < len && depth > 0) { if (body[j] === '(') depth++; if (body[j] === ')') depth--; j++; }
      const forHeader = body.substring(parenStart + 1, j - 1);
      // Find the body (braces or single statement)
      let k = j;
      while (k < len && /\s/.test(body[k])) k++;
      let forBody;
      if (body[k] === '{') {
        depth = 1; let bStart = k + 1; k++;
        while (k < len && depth > 0) { if (body[k] === '{') depth++; if (body[k] === '}') depth--; k++; }
        forBody = body.substring(bStart, k - 1);
      } else {
        const semi = body.indexOf(';', k);
        forBody = body.substring(k, semi >= 0 ? semi : len);
        k = semi >= 0 ? semi + 1 : len;
      }
      statements.push({ type: 'for', header: forHeader, body: forBody });
      i = k;
      continue;
    }

    // Check for block { ... }
    if (body[i] === '{') {
      let depth = 1, j = i + 1;
      while (j < len && depth > 0) { if (body[j] === '{') depth++; if (body[j] === '}') depth--; j++; }
      statements.push({ type: 'block', body: body.substring(i + 1, j - 1) });
      i = j;
      continue;
    }

    // Regular statement (up to next ;)
    let j = i;
    let depth = 0;
    while (j < len) {
      if (body[j] === '(' || body[j] === '{') depth++;
      if (body[j] === ')' || body[j] === '}') depth--;
      if (body[j] === ';' && depth === 0) break;
      j++;
    }
    const stmtText = body.substring(i, j).trim();
    if (stmtText) statements.push({ type: 'stmt', text: stmtText });
    i = j + 1;
  }
  return statements;
}

// ─── Statement Executor (async, with real delays) ───

async function executeBlock(body, defines, helpers, localVars = {}) {
  const tokens = tokenizeStatements(body);

  for (const token of tokens) {
    if (sim.abort) return;

    // Handle for loop
    if (token.type === 'for') {
      const parts = token.header.split(';');
      if (parts.length === 3) {
        // Execute init
        const initStmt = parts[0].trim();
        if (initStmt) {
          const im = initStmt.match(/(?:int|byte|long|float)?\s*(\w+)\s*=\s*(.+)/);
          if (im) { localVars[im[1]] = resolveValue(im[2], {...defines, ...localVars}); }
        }
        // Loop
        const condStr = parts[1].trim();
        const incrStr = parts[2].trim();
        let maxIter = 1000; // safety limit
        while (maxIter-- > 0 && !sim.abort) {
          // Evaluate condition
          if (!evaluateCondition(condStr, defines, localVars)) break;
          // Execute body
          await executeBlock(token.body, defines, helpers, localVars);
          // Increment
          const incM = incrStr.match(/(\w+)\s*(\+\+|--|\+=\s*(.+)|-=\s*(.+))/);
          if (incM) {
            const v = incM[1];
            const cur = typeof localVars[v] === 'number' ? localVars[v] : resolveValue(localVars[v] || '0', defines);
            if (incM[2] === '++') localVars[v] = cur + 1;
            else if (incM[2] === '--') localVars[v] = cur - 1;
            else if (incM[3]) localVars[v] = cur + resolveValue(incM[3], {...defines, ...localVars});
            else if (incM[4]) localVars[v] = cur - resolveValue(incM[4], {...defines, ...localVars});
          }
        }
      }
      continue;
    }

    if (token.type === 'block') {
      await executeBlock(token.body, defines, helpers, localVars);
      continue;
    }

    // Regular statement
    const stmt = token.text;
    if (!stmt) continue;

    let m;

    // Variable assignment: varName = expr (may contain function calls)
    m = stmt.match(/^(?:int|byte|long|float|unsigned\s+long|String)?\s*(\w+)\s*=\s*(.+)$/);
    if (m) {
      const name = m[1];
      let val = m[2].trim();
      val = evaluateExpression(val, defines, localVars);
      localVars[name] = val;
      defines[name] = val;
      continue;
    }

    // digitalWrite(pin, val)
    m = stmt.match(/digitalWrite\s*\(\s*(.+?)\s*,\s*(.+?)\s*\)/);
    if (m) {
      const pin = resolveValue(m[1], {...defines, ...localVars});
      const val = resolveValue(m[2], {...defines, ...localVars});
      sim.pins[pin] = { mode: 1, value: val ? 1 : 0 };
      applySimState();
      continue;
    }

    // analogWrite(pin, val)
    m = stmt.match(/analogWrite\s*\(\s*(.+?)\s*,\s*(.+?)\s*\)/);
    if (m) {
      const pin = resolveValue(m[1], {...defines, ...localVars});
      let val = resolveValue(m[2], {...defines, ...localVars});
      sim.pins[pin] = { mode: 1, value: typeof val === 'number' ? val : 0 };
      applySimState();
      continue;
    }

    // delay(ms)
    m = stmt.match(/delay\s*\(\s*(\d+)\s*\)/);
    if (m) {
      const ms = Math.min(parseInt(m[1]), 2000); // cap visual delay
      await sleep(ms);
      continue;
    }

    // Serial.println(...)
    m = stmt.match(/Serial\.println\s*\(\s*(.*)\s*\)/);
    if (m) {
      const arg = m[1].trim();
      if (arg.startsWith('"') || arg.startsWith("'")) {
        serialPrint(arg.replace(/^["']|["']$/g, '').replace(/\\t/g, '\t') + '\n');
      } else {
        serialPrint(String(resolveValue(arg, {...defines, ...localVars})) + '\n');
      }
      continue;
    }

    // Serial.print(...)
    m = stmt.match(/Serial\.print\s*\(\s*(.*)\s*\)/);
    if (m) {
      const arg = m[1].trim();
      if (arg.startsWith('"') || arg.startsWith("'")) {
        serialPrint(arg.replace(/^["']|["']$/g, '').replace(/\\t/g, '\t'));
      } else {
        serialPrint(String(resolveValue(arg, {...defines, ...localVars})));
      }
      continue;
    }

    // servo.write(angle) / servo.attach(pin)
    m = stmt.match(/(\w+)\.write\s*\(\s*(.+?)\s*\)/);
    if (m) {
      const angle = resolveValue(m[2], {...defines, ...localVars});
      // Find the servo's attached pin
      const servoName = m[1];
      const pin = localVars[`__servo_pin_${servoName}`] || defines[`__servo_pin_${servoName}`];
      if (pin !== undefined) sim.servos[pin] = angle;
      applySimState();
      continue;
    }
    m = stmt.match(/(\w+)\.attach\s*\(\s*(.+?)\s*\)/);
    if (m) {
      const pin = resolveValue(m[2], {...defines, ...localVars});
      localVars[`__servo_pin_${m[1]}`] = pin;
      defines[`__servo_pin_${m[1]}`] = pin;
      sim.servos[pin] = 90;
      continue;
    }

    // Function call: name(args)
    m = stmt.match(/^(\w+)\s*\(\s*(.*?)\s*\)$/);
    if (m && helpers[m[1]]) {
      const func = helpers[m[1]];
      const args = m[2] ? m[2].split(',').map(a => resolveValue(a.trim(), {...defines, ...localVars})) : [];
      const newLocals = {};
      func.params.forEach((p, i) => { newLocals[p] = args[i]; });
      await executeBlock(func.body, defines, helpers, {...localVars, ...newLocals});
      continue;
    }

    // pinMode — just note it
    m = stmt.match(/pinMode\s*\(\s*(.+?)\s*,\s*(.+?)\s*\)/);
    if (m) {
      const pin = resolveValue(m[1], {...defines, ...localVars});
      sim.pins[pin] = { mode: resolveValue(m[2], defines), value: 0 };
      continue;
    }

    // Compound assignment: var += expr, var -= expr, var *= expr, var /= expr
    m = stmt.match(/^(\w+)\s*([+\-*/])=\s*(.+)$/);
    if (m) {
      const name = m[1];
      const op = m[2];
      const cur = typeof localVars[name] === 'number' ? localVars[name] : resolveValue(localVars[name] || defines[name] || '0', {...defines, ...localVars});
      const rhs = evaluateExpression(m[3], defines, localVars);
      switch (op) {
        case '+': localVars[name] = cur + rhs; break;
        case '-': localVars[name] = cur - rhs; break;
        case '*': localVars[name] = cur * rhs; break;
        case '/': localVars[name] = rhs !== 0 ? Math.floor(cur / rhs) : 0; break;
      }
      defines[name] = localVars[name];
      continue;
    }

    // Serial.begin — ignore
    if (stmt.includes('Serial.begin')) continue;
  }
}

// ─── Apply pin states to visual components ───

function applySimState() {
  buildSimConnectionGraph();
  const parts = state.parts;

  // LEDs
  parts.filter(p => p.type === 'wokwi-led').forEach(led => {
    const aPin = findConnectedArduinoPin(led.id, 'A');
    if (aPin !== null) {
      const pinState = sim.pins[aPin] || sim.pins[parseInt(aPin)];
      const val = pinState ? pinState.value : 0;
      led._simBrightness = val > 1 ? val / 255 : val; // PWM or digital
    }
  });

  // Servos
  parts.filter(p => p.type === 'wokwi-servo').forEach(servo => {
    const pwmPin = findConnectedArduinoPin(servo.id, 'PWM');
    if (pwmPin !== null && sim.servos[pwmPin] !== undefined) {
      servo._simAngle = sim.servos[pwmPin];
    } else if (pwmPin !== null && sim.servos[parseInt(pwmPin)] !== undefined) {
      servo._simAngle = sim.servos[parseInt(pwmPin)];
    }
  });

  // H-Bridge → Motors
  parts.filter(p => p.type === 'chip-l298n').forEach(bridge => {
    const pinMap = {};
    ['ENA','IN1','IN2','IN3','IN4','ENB'].forEach(bPin => {
      const aPin = findConnectedArduinoPin(bridge.id, bPin);
      if (aPin !== null) pinMap[bPin] = aPin;
    });

    const getVal = (bPin) => {
      const aPin = pinMap[bPin];
      if (!aPin) return 0;
      const ps = sim.pins[aPin] || sim.pins[parseInt(aPin)];
      return ps ? ps.value : 0;
    };

    const ena = getVal('ENA'), enb = getVal('ENB');
    const in1 = getVal('IN1'), in2 = getVal('IN2');
    const in3 = getVal('IN3'), in4 = getVal('IN4');

    // Channel A
    const motorA = findMotorOnBridgeChannel(bridge.id, 'OUT1', 'OUT2');
    if (motorA) {
      if (ena > 0 && in1 && !in2) { motorA._simDirection = 'CW'; motorA._simSpeed = ena > 1 ? ena/255 : 1; }
      else if (ena > 0 && !in1 && in2) { motorA._simDirection = 'CCW'; motorA._simSpeed = ena > 1 ? ena/255 : 1; }
      else { motorA._simDirection = 'STOP'; motorA._simSpeed = 0; }
    }

    // Channel B
    const motorB = findMotorOnBridgeChannel(bridge.id, 'OUT3', 'OUT4');
    if (motorB) {
      if (enb > 0 && in3 && !in4) { motorB._simDirection = 'CW'; motorB._simSpeed = enb > 1 ? enb/255 : 1; }
      else if (enb > 0 && !in3 && in4) { motorB._simDirection = 'CCW'; motorB._simSpeed = enb > 1 ? enb/255 : 1; }
      else { motorB._simDirection = 'STOP'; motorB._simSpeed = 0; }
    }
  });

  // Direct motor connections (no H-bridge)
  parts.filter(p => p.type === 'chip-dc-motor').forEach(motor => {
    if (motor._simDirection) return; // already set by H-bridge
    const t1Pin = findConnectedArduinoPin(motor.id, 'TERM1');
    const t2Pin = findConnectedArduinoPin(motor.id, 'TERM2');
    const t1 = t1Pin ? (sim.pins[t1Pin] || sim.pins[parseInt(t1Pin)]) : null;
    const t2 = t2Pin ? (sim.pins[t2Pin] || sim.pins[parseInt(t2Pin)]) : null;
    const v1 = t1 ? t1.value : 0, v2 = t2 ? t2.value : 0;
    if (v1 > v2) { motor._simDirection = 'CW'; motor._simSpeed = 1; }
    else if (v2 > v1) { motor._simDirection = 'CCW'; motor._simSpeed = 1; }
    else { motor._simDirection = 'STOP'; motor._simSpeed = 0; }
  });

  renderComponents();
}

// ─── Run Firmware ───

async function simStart() {
  const code = document.getElementById('simCode').value;
  if (!code.trim()) { serialPrint('No code to run.\n'); return; }

  simReset();
  sim.abort = false;
  sim.running = true;
  document.getElementById('simStatus').textContent = 'Running';
  document.getElementById('btnSimRun').disabled = true;
  document.getElementById('btnSimStop').disabled = false;

  buildSimConnectionGraph();

  try {
    const parsed = parseSource(code);
    serialPrint('--- Running setup() ---\n');
    await executeBlock(parsed.setupBody, parsed.defines, parsed.helpers);

    serialPrint('--- Running loop() ---\n');
    while (!sim.abort) {
      await executeBlock(parsed.loopBody, parsed.defines, parsed.helpers);
      if (sim.abort) break;
      await sleep(50); // Small gap between iterations
    }
  } catch (e) {
    serialPrint('ERROR: ' + e.message + '\n');
  }

  sim.running = false;
  document.getElementById('simStatus').textContent = 'Stopped';
  document.getElementById('btnSimRun').disabled = false;
  document.getElementById('btnSimStop').disabled = true;
}

// SIMULATION UI BINDINGS
// ═══════════════════════════════════════════════════════

function initSimPanel() {
  document.getElementById('btnSimToggle').addEventListener('click', () => {
    const panel = document.getElementById('simPanel');
    panel.classList.toggle('visible');
    if (panel.classList.contains('visible')) renderSimControls();
  });
  document.getElementById('btnSimRun').addEventListener('click', simStart);
  document.getElementById('btnSimStop').addEventListener('click', simStop);
  document.getElementById('btnSimReset').addEventListener('click', () => {
    simReset();
    document.getElementById('serialOutput').textContent = '';
  });
  document.getElementById('btnSerialClear').addEventListener('click', () => {
    document.getElementById('serialOutput').textContent = '';
  });

  // Tab key support in code editor
  document.getElementById('simCode').addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target;
      const start = ta.selectionStart;
      ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + 2;
    }
  });

  // Render controls whenever sim panel opens
  renderSimControls();
}

// Build interactive controls for input components (potentiometers, buttons, etc.)
function renderSimControls() {
  const container = document.getElementById('simControls');
  if (!container) return;
  let html = '';

  const pots = state.parts.filter(p => p.type === 'wokwi-potentiometer');
  const buttons = state.parts.filter(p => p.type === 'wokwi-pushbutton');

  if (pots.length > 0) {
    pots.forEach(p => {
      html += `<label>${p.id} (Pot)</label>`;
      html += `<input type="range" min="0" max="1023" value="512" data-sim-pot="${p.id}">`;
      html += `<span class="ctrl-val" data-sim-pot-val="${p.id}">512</span>`;
    });
  }

  if (buttons.length > 0) {
    buttons.forEach(p => {
      html += `<label>${p.id}</label>`;
      html += `<button class="toolbar-btn" data-sim-btn="${p.id}" style="font-size:10px;padding:2px 8px;">PRESS</button>`;
    });
  }

  if (!html) {
    html = '<div class="no-controls">No input components</div>';
  }
  container.innerHTML = html;

  // Attach slider events
  container.querySelectorAll('input[type=range]').forEach(slider => {
    slider.addEventListener('input', () => {
      const id = slider.dataset.simPot;
      const valEl = container.querySelector(`[data-sim-pot-val="${id}"]`);
      if (valEl) valEl.textContent = slider.value;
    });
  });
}

// Get the current value of a potentiometer slider by its connected Arduino pin
function getSimAnalogInput(pin) {
  // Find which potentiometer connects to this Arduino pin
  buildSimConnectionGraph();
  const pots = state.parts.filter(p => p.type === 'wokwi-potentiometer');
  for (const pot of pots) {
    const sigPin = findConnectedArduinoPin(pot.id, 'SIG');
    if (sigPin === pin || sigPin === String(pin) || parseInt(sigPin) === pin) {
      const slider = document.querySelector(`[data-sim-pot="${pot.id}"]`);
      return slider ? parseInt(slider.value) : 512;
    }
  }
  return 512; // default midpoint
}

// ═══════════════════════════════════════════════════════
// DRAG & DROP FROM FILESYSTEM
// ═══════════════════════════════════════════════════════

document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  if (e.target.closest('.palette-item')) return;
  e.preventDefault();
  for (const file of e.dataTransfer.files) {
    if (file.name.endsWith('.json')) {
      loadDiagramFile(file);
    } else if (file.name.endsWith('.cpp') || file.name.endsWith('.ino')) {
      // Load Arduino source into sim code editor
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('simCode').value = ev.target.result;
        // Auto-open sim panel
        document.getElementById('simPanel').classList.add('visible');
        renderSimControls();
      };
      reader.readAsText(file);
    }
  }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

window.addEventListener('load', init);
window.addEventListener('resize', updateViewTransform);
</script>
