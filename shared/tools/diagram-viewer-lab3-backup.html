<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 3: DC Motor Control — Circuit Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; min-height: 100vh; }
  header { padding: 12px 24px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header .badge { background: #0f3460; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #7ec8e3; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .diagram-panel { flex: 2; padding: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
  .controls-panel { flex: 1; max-width: 340px; padding: 20px; background: #16213e; border-left: 1px solid #0f3460; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #7ec8e3; margin-bottom: 8px; }

  /* Controls */
  .control-group { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; }
  .control-row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; }
  .control-row label { font-size: 12px; font-family: monospace; color: #aaa; }
  .toggle { width: 40px; height: 22px; background: #333; border-radius: 11px; cursor: pointer; position: relative; transition: background 0.2s; }
  .toggle.on { background: #4caf50; }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(18px); }
  .slider-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .slider-row label { font-size: 12px; font-family: monospace; color: #aaa; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #9c27b0; }
  .slider-row .value { font-size: 12px; font-family: monospace; color: #fff; min-width: 40px; text-align: right; }

  /* Serial monitor */
  .serial-monitor { background: #111; border: 1px solid #333; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; line-height: 1.6; height: 160px; overflow-y: auto; color: #0f0; }
  .serial-monitor .info { color: #7ec8e3; }
  .serial-monitor .motor { color: #ffb300; }

  /* Motor status */
  .motor-status { display: flex; gap: 12px; }
  .motor-card { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 10px; text-align: center; }
  .motor-card h4 { font-size: 11px; color: #888; margin-bottom: 6px; }
  .motor-card .direction { font-size: 20px; margin: 4px 0; }
  .motor-card .speed-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .motor-card .speed-bar .fill { height: 100%; background: #4caf50; transition: width 0.15s; }
  .motor-card.reverse .speed-bar .fill { background: #f44336; }
  .motor-card .speed-label { font-size: 10px; color: #888; margin-top: 4px; }

  /* SVG diagram */
  #circuit-svg { width: 100%; height: 100%; max-width: 700px; max-height: 500px; }
  .wire { stroke-width: 2.5; fill: none; transition: opacity 0.2s; }
  .wire.active { stroke-width: 3.5; filter: drop-shadow(0 0 4px currentColor); }
  .component { transition: opacity 0.2s; }
  .pin-dot { r: 4; }
</style>
</head>

        <button id="btn-stop" style="width:100%;padding:8px;margin-top:6px;background:#333;color:#fff;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:12px;">⏹ Stop</button>

<script>
// State
const state = { ena: 0, enb: 0, in1: false, in2: false, in3: false, in4: false };
let demoInterval = null;

// DOM refs
const ctrlEna = document.getElementById('ctrl-ena');
const ctrlEnb = document.getElementById('ctrl-enb');
const valEna = document.getElementById('val-ena');
const valEnb = document.getElementById('val-enb');
const toggles = { in1: document.getElementById('ctrl-in1'), in2: document.getElementById('ctrl-in2'), in3: document.getElementById('ctrl-in3'), in4: document.getElementById('ctrl-in4') };
const serial = document.getElementById('serial');

// Toggle click handlers
Object.entries(toggles).forEach(([key, el]) => {
  el.addEventListener('click', () => {
    state[key] = !state[key];
    el.classList.toggle('on', state[key]);
    update();
  });
});

// Slider handlers
ctrlEna.addEventListener('input', () => { state.ena = parseInt(ctrlEna.value); valEna.textContent = state.ena; update(); });
ctrlEnb.addEventListener('input', () => { state.enb = parseInt(ctrlEnb.value); valEnb.textContent = state.enb; update(); });

// L298N H-Bridge Logic (same as chip.c)
function computeOutputs() {
  const Vs = 12;
  let outA = { v1: 0, v2: 0, direction: 'STOPPED', speed: 0 };
  let outB = { v1: 0, v2: 0, direction: 'STOPPED', speed: 0 };

  const dutyA = state.ena / 255;
  const dutyB = state.enb / 255;

  if (state.ena > 0) {
    outA.v1 = state.in1 ? Vs * dutyA : 0;
    outA.v2 = state.in2 ? Vs * dutyA : 0;
    const diff = outA.v1 - outA.v2;
    if (diff > 0.5) { outA.direction = 'FORWARD'; outA.speed = Math.round(dutyA * 100); }
    else if (diff < -0.5) { outA.direction = 'REVERSE'; outA.speed = Math.round(dutyA * 100); }
    else if (state.in1 && state.in2) { outA.direction = 'BRAKE'; outA.speed = 0; }
  }

  if (state.enb > 0) {
    outB.v1 = state.in3 ? Vs * dutyB : 0;
    outB.v2 = state.in4 ? Vs * dutyB : 0;
    const diff = outB.v1 - outB.v2;
    if (diff > 0.5) { outB.direction = 'FORWARD'; outB.speed = Math.round(dutyB * 100); }
    else if (diff < -0.5) { outB.direction = 'REVERSE'; outB.speed = Math.round(dutyB * 100); }
    else if (state.in3 && state.in4) { outB.direction = 'BRAKE'; outB.speed = 0; }
  }

  return { a: outA, b: outB };
}

function update() {
  const { a, b } = computeOutputs();

  // Motor A visual
  const dirA = document.getElementById('dir-a');
  const speedA = document.getElementById('speed-a');
  const speedALabel = document.getElementById('speed-a-label');
  const statusA = document.getElementById('status-a');
  dirA.textContent = a.direction === 'FORWARD' ? '⟳' : a.direction === 'REVERSE' ? '⟲' : a.direction === 'BRAKE' ? '🛑' : '⏸';
  speedA.style.width = a.speed + '%';
  speedALabel.textContent = a.speed + '%';
  statusA.className = 'motor-card' + (a.direction === 'REVERSE' ? ' reverse' : '');

  // Motor B visual
  const dirB = document.getElementById('dir-b');
  const speedB = document.getElementById('speed-b');
  const speedBLabel = document.getElementById('speed-b-label');
  const statusB = document.getElementById('status-b');
  dirB.textContent = b.direction === 'FORWARD' ? '⟳' : b.direction === 'REVERSE' ? '⟲' : b.direction === 'BRAKE' ? '🛑' : '⏸';
  speedB.style.width = b.speed + '%';
  speedBLabel.textContent = b.speed + '%';
  statusB.className = 'motor-card' + (b.direction === 'REVERSE' ? ' reverse' : '');

  // SVG motor arrows
  document.getElementById('motor-a-arrow').setAttribute('opacity', a.direction === 'FORWARD' ? '1' : '0');
  document.getElementById('motor-a-arrow-rev').setAttribute('opacity', a.direction === 'REVERSE' ? '1' : '0');
  document.getElementById('motor-b-arrow').setAttribute('opacity', b.direction === 'FORWARD' ? '1' : '0');
  document.getElementById('motor-b-arrow-rev').setAttribute('opacity', b.direction === 'REVERSE' ? '1' : '0');

  // SVG motor color
  document.getElementById('motor-a-body').setAttribute('fill', a.direction === 'FORWARD' ? '#66bb6a' : a.direction === 'REVERSE' ? '#ef5350' : '#ffb300');
  document.getElementById('motor-b-body').setAttribute('fill', b.direction === 'FORWARD' ? '#66bb6a' : b.direction === 'REVERSE' ? '#ef5350' : '#ffb300');

  // Wire highlights
  document.getElementById('wire-ena').classList.toggle('active', state.ena > 0);
  document.getElementById('wire-in1').classList.toggle('active', state.in1);
  document.getElementById('wire-in2').classList.toggle('active', state.in2);
  document.getElementById('wire-in3').classList.toggle('active', state.in3);
  document.getElementById('wire-in4').classList.toggle('active', state.in4);
  document.getElementById('wire-enb').classList.toggle('active', state.enb > 0);
  document.getElementById('wire-out1').classList.toggle('active', a.direction !== 'STOPPED');
  document.getElementById('wire-out2').classList.toggle('active', a.direction !== 'STOPPED');
  document.getElementById('wire-out3').classList.toggle('active', b.direction !== 'STOPPED');
  document.getElementById('wire-out4').classList.toggle('active', b.direction !== 'STOPPED');

  // ENA/ENB value labels on diagram
  document.getElementById('label-ena-val').textContent = state.ena;
  document.getElementById('label-enb-val').textContent = state.enb;
}

function log(msg, cls = '') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  serial.appendChild(line);
  serial.scrollTop = serial.scrollHeight;
}

// Demo sequence (mirrors main.cpp loop)
function runDemo() {
  stopDemo();
  log('--- Demo started ---', 'info');
  const steps = [
    { ena: 191, enb: 191, in1: true, in2: false, in3: true, in4: false, msg: 'Both motors FORWARD @ 75%', duration: 2000 },
    { ena: 0, enb: 0, in1: false, in2: false, in3: false, in4: false, msg: 'STOPPED', duration: 1000 },
    { ena: 127, enb: 127, in1: false, in2: true, in3: false, in4: true, msg: 'Both motors REVERSE @ 50%', duration: 2000 },
    { ena: 0, enb: 0, in1: false, in2: false, in3: false, in4: false, msg: 'STOPPED', duration: 1000 },
    { ena: 150, enb: 150, in1: true, in2: false, in3: false, in4: true, msg: 'Turning LEFT (differential)', duration: 1500 },
    { ena: 0, enb: 0, in1: false, in2: false, in3: false, in4: false, msg: 'STOPPED', duration: 1000 },
    { ena: 150, enb: 150, in1: false, in2: true, in3: true, in4: false, msg: 'Turning RIGHT (differential)', duration: 1500 },
    { ena: 0, enb: 0, in1: false, in2: false, in3: false, in4: false, msg: 'STOPPED', duration: 2000 },
  ];

  let i = 0;
  function step() {
    if (i >= steps.length) { i = 0; } // loop
    const s = steps[i];
    state.ena = s.ena; state.enb = s.enb;
    state.in1 = s.in1; state.in2 = s.in2; state.in3 = s.in3; state.in4 = s.in4;
    // Sync UI
    ctrlEna.value = state.ena; valEna.textContent = state.ena;
    ctrlEnb.value = state.enb; valEnb.textContent = state.enb;
    toggles.in1.classList.toggle('on', state.in1);
    toggles.in2.classList.toggle('on', state.in2);
    toggles.in3.classList.toggle('on', state.in3);
    toggles.in4.classList.toggle('on', state.in4);
    update();
    log(s.msg, 'motor');
    i++;
    demoInterval = setTimeout(step, s.duration);
  }
  step();
}

function stopDemo() {
  if (demoInterval) { clearTimeout(demoInterval); demoInterval = null; }
}

document.getElementById('btn-demo').addEventListener('click', runDemo);
document.getElementById('btn-stop').addEventListener('click', () => { stopDemo(); log('--- Demo stopped ---', 'info'); });
