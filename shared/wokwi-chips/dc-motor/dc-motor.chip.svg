<svg xmlns="http://www.w3.org/2000/svg" width="100" height="80" viewBox="0 0 100 80">
  <!-- Motor housing -->
  <ellipse cx="50" cy="40" rx="30" ry="30" fill="#ffb300" stroke="#f57f17" stroke-width="2"/>
  
  <!-- Motor shaft side -->
  <rect x="78" y="35" width="18" height="10" rx="2" fill="#9e9e9e" stroke="#616161" stroke-width="1"/>
  
  <!-- Motor label -->
  <text x="50" y="38" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#212121">DC</text>
  <text x="50" y="48" text-anchor="middle" font-family="monospace" font-size="7" fill="#424242">MOTOR</text>
  
  <!-- Terminal wires -->
  <rect x="4" y="28" width="18" height="6" rx="1" fill="#d32f2f"/>
  <rect x="4" y="46" width="18" height="6" rx="1" fill="#212121"/>
  
  <!-- Terminal labels -->
  <text x="8" y="26" font-family="monospace" font-size="6" fill="#d32f2f">T1</text>
  <text x="8" y="60" font-family="monospace" font-size="6" fill="#424242">T2</text>
  
  <!-- Rotation arrow -->
  <path d="M 42 18 A 16 16 0 0 1 62 22" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#424242"/>
    </marker>
  </defs>
</svg>
